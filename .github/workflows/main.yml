name: Build Mobile Whiteboard APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Create project files
        run: |
          mkdir -p src
          # تحويل ملف 'للهاتف.html' ليكون هو الملف الرئيسي للتطبيق
          cp "index.html" src/index.html
          
          cat > package.json << 'EOF'
          {
            "name": "infinite.whiteboard.mobile",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/android": "5.7.0",
              "@capacitor/core": "5.7.0"
            },
            "devDependencies": {
              "@capacitor/cli": "5.7.0"
            }
          }
          EOF

          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.ossama.whiteboard.mobile",
            "appName": "السبورة الذكية",
            "webDir": "src",
            "android": {
              "backgroundColor": "#f3f4f6",
              "allowMixedContent": true
            }
          }
          EOF

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Add Android platform
        run: npx cap add android

      - name: Sync web files
        run: npx cap sync android

      - name: Set App Icon
        run: |
          mkdir -p assets
          curl -L "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQtqcg6zsweD4gOxtyqyKZ5SKHzlNr4NZu8_A&s" -o assets/icon.png
          npm install -g @capacitor/assets
          npx capacitor-assets generate --android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Whiteboard-Mobile-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
